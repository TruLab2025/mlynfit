<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" role="img" aria-labelledby="title desc">
  <title id="title">Statyczna mapa dojazdu do MLYNfit</title>
  <desc id="desc">Mapa pokazuje lokalizacje MLYNfit przy ulicy Mlynskiej 1A w Garbowie, przy trasie z Lublina.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141917"/>
      <stop offset="0.54" stop-color="#222620"/>
      <stop offset="1" stop-color="#111412"/>
    </linearGradient>
    <linearGradient id="roadMain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f26722"/>
      <stop offset="1" stop-color="#ff9552"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="920" height="440" fill="url(#bg)"/>
  <rect width="920" height="440" fill="url(#grid)"/>

  <!-- main route (adjusted to match real S17 curve from screenshot) -->
  <path d="M-20 220 C120 180 240 170 360 150 C520 140 640 150 760 190 C820 210 880 220 940 230" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="70" stroke-linecap="round"/>
  <path d="M-20 220 C120 180 240 170 360 150 C520 140 640 150 760 190 C820 210 880 220 940 230" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="34" stroke-linecap="round"/>
  <path d="M-20 220 C120 180 240 170 360 150 C520 140 640 150 760 190 C820 210 880 220 940 230" fill="none" stroke="url(#roadMain)" stroke-width="14" stroke-linecap="round"/>

  <path d="M128 102 C220 132 284 150 360 206 C438 264 515 296 650 318" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="18" stroke-linecap="round"/>
  <path d="M128 102 C220 132 284 150 360 206 C438 264 515 296 650 318" fill="none" stroke="#333a34" stroke-width="7" stroke-linecap="round"/>

  <path d="M544 50 C526 112 494 163 430 224 C385 268 347 322 310 418" fill="none" stroke="#ffffff" stroke-opacity="0.13" stroke-width="16" stroke-linecap="round"/>
  <path d="M544 50 C526 112 494 163 430 224 C385 268 347 322 310 418" fill="none" stroke="#2c332e" stroke-width="6" stroke-linecap="round"/>

  <g opacity="0.7">
    <rect x="72" y="64" width="116" height="64" rx="8" fill="#242a25" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="206" y="70" width="84" height="52" rx="8" fill="#1b201d" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="664" y="250" width="128" height="66" rx="8" fill="#242a25" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="704" y="332" width="78" height="42" rx="8" fill="#1b201d" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <!-- marker and label moved nearer to Garbów center as on screenshot -->
  <g filter="url(#softShadow)">
    <rect x="420" y="110" width="260" height="120" rx="12" fill="#f8efe8"/>
    <path d="M542 230 L566 230 L554 252 Z" fill="#f8efe8"/>
    <text x="450" y="146" fill="#111412" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">TU TRENUJESZ</text>
    <text x="450" y="180" fill="#111412" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">MLYN<tspan fill="#f26722">fit</tspan></text>
    <text x="450" y="206" fill="#4a4a4a" font-family="Arial, Helvetica, sans-serif" font-size="16">ul. Mlynska 1A, Garbow</text>
  </g>

  <g transform="translate(560 188)" filter="url(#softShadow)">
    <circle r="28" fill="#f26722"/>
    <circle r="12" fill="#ffffff"/>
    <circle r="6" fill="#111412"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="72" y="360" fill="#ffffff" fill-opacity="0.9" font-size="22" font-weight="800">Lublin</text>
    <text x="548" y="162" fill="#ffffff" fill-opacity="0.95" font-size="20" font-weight="800">Garbów</text>
    <text x="628" y="188" fill="#f26722" font-size="14" font-weight="800">S17 / dojazd z Lublina</text>
    <text x="468" y="206" fill="#ffffff" fill-opacity="0.58" font-size="13">ul. Młyńska</text>
  </g>

  <g transform="translate(52 46)">
    <rect width="178" height="38" rx="19" fill="#000000" fill-opacity="0.24" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="23" cy="19" r="7" fill="#f26722"/>
    <text x="42" y="24" fill="#ffffff" fill-opacity="0.86" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">10 min od Lublina</text>
  </g>
</svg>
