    <rect x="206" y="70" width="84" height="40"    <rect x="206" y="70" width="84" height="40"    <rect x="206" y="70" width="84" height="40"    <rect x="206" y="70" width="84" height="40"    <rect x="206" y="70" width=""/>    <rect x="206"" y="332" width="78" height="36" rx="8" fill="#1b201d" stroke="#ffffff" stroke-opacity="0.06"/>
  </g>

  <!-- Route direction arrow -->
  <g opacity="0.6">
    <line x1="340" y1="156" x2="500" y2="146" stroke="#f26722" stroke-width="3" stroke-dasharray="8,6" marker-end="url(#arrowhead)"/>
    <text x="370" y="1    <text x="370" y="1    <text x="370" y="1    <text x="370" y="1    <text x="370" y="1    <text x="370" y="1    <text x="370" y="1    <text x="370" y="1    <tex#glow)">
    <circle cx="560" cy="190" r="24" fill="#f26722"/>
