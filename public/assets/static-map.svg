  <path d="M-20 220 C120 180 240 170 360 150 C520 140 640 150 760 190 C820 210 880 220 940 230" fill="none" stroke="url(#roadMain)" stroke-width="12" stroke-linecap="round"/>

  <!-- Side roads -->
