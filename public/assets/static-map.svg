  <path d="M128 102 C220 132 284 150 360 206 C438 264 515 296 650 318" fill="none" stroke="#333a34" stroke-width="6" stroke-linecap="round"/>

  <path d="M544 50 C526 112 494 163 430 224 C385 268 347 322 310 418" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="16" stroke-linecap="round"/>
  <path d="M544 50 C526 112 494 163 430 224 C385 268 347 322 310 418" fill="none" stroke="#2c332e" stroke-width="5" stroke-linecap="round"/>

